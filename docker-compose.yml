services:
  db:
    image: mysql:8.0
    container_name: buddyscript-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ${DB_NAME:-buddyscript}
      MYSQL_USER: ${DB_USER:-buddyscript}
      MYSQL_PASSWORD: ${DB_PASSWORD:-buddyscript}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 120s

  backend:
    build: ./backend
    container_name: buddyscript-backend
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3000}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-buddyscript}
      DB_PASSWORD: ${DB_PASSWORD:-buddyscript}
      DB_NAME: ${DB_NAME:-buddyscript}
      JWT_SECRET: ${JWT_SECRET:-buddyscript-docker-secret}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 120s

  frontend:
    build: ./frontend
    container_name: buddyscript-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
  uploads_data:
